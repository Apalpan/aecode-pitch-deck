<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AECODE Pitch Deck Final de 5 minutos: presentacion navegable sobre adopcion tecnologica en construccion."
    />
    <title>AECODE Pitch Deck Final</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230E1121'/%3E%3Cpath d='M7 23 16 6l9 17h-5l-1.5-3.4h-5.2L11.8 23H7Zm8-7h2.1L16 13.4 15 16Z' fill='%2395E3B1'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="progress-line" id="progress-line" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="#deck" aria-label="AECODE Pitch Deck">
        <img src="./assets/aecode-logo.svg" alt="AECODE" />
      </a>
      <nav aria-label="Controles de presentacion">
        <button id="prev-btn" class="icon-button" type="button" aria-label="Slide anterior">←</button>
        <button id="next-btn" class="icon-button primary" type="button" aria-label="Slide siguiente">→</button>
        <button id="notes-toggle" class="text-button" type="button">Guion</button>
        <button id="timer-toggle" class="text-button" type="button">5:00</button>
        <button id="print-btn" class="text-button" type="button">PDF</button>
      </nav>
    </header>

    <main id="deck" class="deck-shell">
      <aside class="filmstrip" aria-label="Indice de slides">
        <div class="deck-meta">
          <span>Pitch Deck Final</span>
          <strong>5 minutos</strong>
        </div>
        <div id="slide-list" class="slide-list"></div>
      </aside>

      <section class="stage" aria-live="polite">
        <article id="slide-card" class="slide-card"></article>
        <div class="mobile-controls">
          <button id="mobile-prev" class="icon-button" type="button" aria-label="Slide anterior">←</button>
          <span id="mobile-counter"></span>
          <button id="mobile-next" class="icon-button primary" type="button" aria-label="Slide siguiente">→</button>
        </div>
      </section>

      <aside id="notes-panel" class="notes-panel" aria-label="Guion del slide">
        <div class="notes-head">
          <span>Guion presencial</span>
          <strong id="notes-title"></strong>
        </div>
        <div id="speaker-notes" class="speaker-notes"></div>
      </aside>
    </main>

    <section id="print-deck" class="print-deck" aria-label="Version imprimible"></section>

    <script src="./app.js"></script>
  </body>
</html>
